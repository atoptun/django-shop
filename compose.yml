services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_OUT_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: .
      target: production
    command: >
      sh -c "uv run manage.py migrate &&
             uv run manage.py setup_admin &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    # environment:
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      # test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin4:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    user: "5050:5050"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
    name: django_shop_postgres_prod_data
  pgadmin_data:
    name: django_shop_pgadmin_prod_data
  static_volume:
    name: django_shop_staticfiles_prod_data
